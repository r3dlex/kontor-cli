# kontor-cli Folder Descriptions
# This file documents every live folder's purpose, what emails go there,
# and routing hints for the classification engine.
# Keep this in sync with rules/rules.d/*.yaml.

# ============================================================
# TOP-LEVEL FOLDERS
# ============================================================

0_Action:
  description: "Flagged actionable emails requiring a response, decision, or follow-up"
  scope: "Questions, requests, decisions, deadlines, C-level asks, escalation items"
  examples:
    - "Request for approval of..."
    - "Can you review..."
    - "Decision needed on..."
    - "Deadline: ..."
  notes: "Emails are COPIED here (flag), not moved. Original stays in its classification folder."

1_Management:
  description: "Directory for management-related subfolders"
  scope: "Parent container - no emails stored directly here"

1_Management/1on1:
  description: "One-on-one meeting notes, preparation, and follow-ups"
  scope: "1:1s with direct reports, skip-level meetings, sync sessions"
  examples:
    - "1:1 with ..."
    - "Sync on ..."
    - "One-on-one notes"
  key_senders: ["Georg Reitschmidt", "Adam Lipinski", "Jón Sigbjörnsson"]

1_Management/HR:
  description: "HR-related communications, people processes, Workday"
  scope: "Workday notifications, performance reviews, HR policies, employee relations"
  examples:
    - "Performance Improvement Plan"
    - "Workday: ..."
    - "HR policy update..."
  key_senders: ["hr.ger@rib-software.com", "myworkday.com"]

1_Management/Leadership:
  description: "Executive communications, management board topics"
  scope: "Geschäftsführung, Vorstand, leadership decisions, org changes"
  examples:
    - "Management Board..."
    - "Geschäftsführung..."
    - "Leadership offsite..."
    - "Teilwiderruf..."
  key_senders: ["Cordula Trillhaas", "Rolf Helmes", "Georg Reitschmidt"]

