# ============================================================
# INFO & SYSTEM FOLDERS
# ============================================================

4_Info:
  description: "Read-only informational emails, newsletters, internal broadcasts"
  scope: "Company announcements, newsletters, digests, notifications without action items"
  examples:
    - "Teams notification"
    - "SharePoint update"
    - "Company newsletter"
    - "Yammer digest"
  notes: "4352 emails - largest folder by volume. Review archive rules."

9_System:
  description: "Automated system notifications, CI/CD, DevOps alerts"
  scope: "Jira notifications, Azure DevOps alerts, build notifications, monitoring alerts, automated service emails"
  examples:
    - "Jira: ..."
    - "Build failed..."
    - "DevOps pipeline..."
    - "Monitoring alert..."
  key_senders: ["@atlassian.net", "dse@eumail.docusign.net"]

# ============================================================
# SPECIAL FOLDERS
# ============================================================

INBOX:
  description: "Temporary processing folder - all incoming email lands here"
  scope: "Zero-inbox target. Emails must be classified and moved within 24 hours."
  notes: "677 emails remaining. Processing pipeline should be run."

Archive:
  description: "Mirror of full folder structure for emails older than 6 months"
  scope: "Automatic archival. Every live folder has a mirror under Archive/."
  notes: "5905 emails archived. Some Archive subfolders have no live counterpart."
