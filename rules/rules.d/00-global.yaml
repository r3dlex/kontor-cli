# GLOBAL RULES — evaluated in priority order
# Priority: higher numbers = higher priority
# Matches on: from (regex), subject (regex), pattern (matches any field)
# Folder targets match the EXISTING Exchange subfolder structure.

# --- PRIORITY 100: SYSTEM (9_System) ---
# Jira / Atlassian
- from: ".*@.*\\.atlassian\\.net"
  folder: "9_System"
  priority: 100
- from: "info@e\\.atlassian\\.com"
  folder: "9_System"
  priority: 100

# DocuSign
- from: "dse@eumail\\.docusign\\.net"
  folder: "9_System"
  priority: 100

# CoachHub
- from: "support@coachhub\\.io"
  folder: "9_System"
  priority: 100

# --- PRIORITY 95: INTERNAL COMMUNICATIONS (4_Info) ---
# Teams (no-reply)
- from: "no-reply@teams\\.mail\\.microsoft"
  folder: "4_Info"
  priority: 95

# Yammer
- from: "noreply@eu\\.yammer\\.com"
  folder: "4_Info"
  priority: 95

# SharePoint
- from: "no-reply@sharepointonline\\.com"
  folder: "4_Info"
  priority: 95

# Microsoft Engage
- from: "noreply_ribgroup@eu\\.engage\\.mail\\.microsoft"
  folder: "4_Info"
  priority: 95

# Outlook reaction digests
- from: "no-reply@outlook\\.mail\\.microsoft"
  folder: "4_Info"
  priority: 95

# --- PRIORITY 90: HR (1_Management/HR) ---
# Workday
- from: ".*@myworkday\\.com"
